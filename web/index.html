<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>💀 Dead Drop</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>" />
</head>
<body>

  <!-- ─── Auth ─── -->
  <div id="auth" class="page auth-page hidden">
    <div class="logo">💀</div>
    <h1>DEAD DROP</h1>
    <p class="tagline">Anonymous · Encrypted · Ephemeral</p>

    <form id="auth-form" class="auth-form" autocomplete="off">
      <input id="auth-user" type="text" placeholder="Username" maxlength="20"
             spellcheck="false" autocomplete="username" required />
      <input id="auth-pass" type="password" placeholder="Password"
             autocomplete="current-password" required />
      <div id="auth-error" class="auth-error hidden"></div>
      <div class="auth-buttons">
        <button type="submit" id="login-btn" class="btn primary">Login</button>
        <button type="button" id="register-btn" class="btn">Register</button>
      </div>
      <p class="auth-hint">No email. No recovery. Just a handle and a password.</p>
    </form>
  </div>

  <!-- ─── Landing ─── -->
  <div id="landing" class="page landing hidden">
    <div class="user-bar">
      <span>👤 <span id="user-display"></span></span>
      <button id="logout-btn" class="btn btn-sm">Logout</button>
    </div>

    <div class="logo">💀</div>
    <h1>DEAD DROP</h1>
    <p class="tagline">Anonymous · Encrypted · Ephemeral</p>

    <div class="actions">
      <button id="create-room" class="btn primary">Create Room</button>
      <div class="divider">or</div>
      <div class="join-group">
        <input id="room-code-input" type="text" placeholder="Room code" maxlength="12"
               spellcheck="false" autocomplete="off" />
        <button id="join-room" class="btn">Join</button>
      </div>
    </div>
  </div>

  <!-- ─── Chat ─── -->
  <div id="chat-wrap" class="page chat-wrap hidden">
    <header class="chat-header">
      <div class="header-left">
        <span class="brand">💀 DD</span>
        <div id="room-info" class="room-info hidden">
          <code id="room-code"></code>
          <button id="copy-code" class="btn-icon" title="Copy code">📋</button>
        </div>
      </div>
      <div class="header-right">
        <button id="call-btn" class="btn-icon call-btn" title="Start call" style="display:none">📞</button>
        <div id="status" class="status waiting">⏳ Initializing…</div>
      </div>
    </header>

    <!-- Incoming call notification -->
    <div id="incoming-call" class="incoming-call hidden">
      <span class="incoming-call-icon">📞</span>
      <span>Incoming call…</span>
      <div class="incoming-call-btns">
        <button id="accept-call" class="btn primary btn-sm">Accept</button>
        <button id="reject-call" class="btn btn-sm btn-danger">Reject</button>
      </div>
    </div>

    <div id="messages" class="messages"></div>

    <footer class="chat-footer">
      <div class="controls">
        <label class="toggle-label" title="Burn after reading">
          <input id="burn-toggle" type="checkbox" />
          <span>🔥 Burn</span>
        </label>
        <select id="ttl-select" title="Self-destruct timer">
          <option value="0">No TTL</option>
          <option value="10">10 s</option>
          <option value="30" selected>30 s</option>
          <option value="60">1 min</option>
          <option value="300">5 min</option>
        </select>
      </div>
      <div class="input-row">
        <button id="attach-btn" class="btn-icon" title="Attach file (max 25 MB)">📎</button>
        <input id="msg-input" type="text" placeholder="Type a message…"
               autocomplete="off" spellcheck="false" />
        <button id="send-btn" class="btn primary">Send</button>
      </div>
      <input id="file-input" type="file" class="hidden" />
    </footer>
  </div>

  <!-- Call overlay (full-screen, over everything) -->
  <div id="call-overlay" class="call-overlay hidden">
    <div id="call-status-bar" class="call-status-bar hidden"></div>
    <div class="call-videos">
      <video id="remote-video" autoplay playsinline></video>
      <video id="local-video" autoplay playsinline muted></video>
      <div id="remote-placeholder" class="video-placeholder">
        <span>💀</span>
        <span class="placeholder-text">Waiting for video…</span>
      </div>
    </div>
    <div class="call-controls">
      <button id="toggle-mic" class="call-ctrl" title="Mute microphone">🎤</button>
      <button id="toggle-cam" class="call-ctrl" title="Turn off camera">📹</button>
      <button id="back-to-chat" class="call-ctrl" title="Show chat">💬</button>
      <button id="end-call" class="call-ctrl call-ctrl-end" title="End call">📵</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
